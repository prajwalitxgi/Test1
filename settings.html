<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings | Enterprise Portal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    body { background-color: #28243d; color: #dbdade; padding-left: 300px; }
    header, main, footer { padding-left: 300px; }
    @media only screen and (max-width : 992px) {
      header, main, footer, body { padding-left: 0; }
    }
    .sidenav { background-color: #2f2b48; border-right: 1px solid #444059; }
    .sidenav li > a { color: #dbdade; }
    .collection { border: 1px solid #444059; border-radius: 8px; overflow: hidden; }
    .collection .collection-item { background-color: #2f2b48; border-bottom: 1px solid #444059; color: #dbdade; }
    .collection .collection-header { background-color: #312d4b; border-bottom: 1px solid #444059; color: #fff; }
  </style>
</head>
<body>

  <!-- Side Navigation -->
  <ul id="slide-out" class="sidenav sidenav-fixed">
    <li>
      <div class="user-view">
        <div class="background indigo darken-4"></div>
        <a href="#user"><i class="material-icons large white-text">account_circle</i></a>
        <a href="#name"><span class="white-text name">Admin User</span></a>
        <a href="#email"><span class="white-text email">admin@enterprise.com</span></a>
      </div>
    </li>
    <li><a href="index.html" class="waves-effect"><i class="material-icons white-text">home</i>Home</a></li>
    <li><a href="dashboard.html" class="waves-effect"><i class="material-icons white-text">dashboard</i>Dashboard</a></li>
    <li class="active"><a href="#!" class="waves-effect"><i class="material-icons white-text">settings</i>Settings</a></li>
    <li><div class="divider" style="background-color: #444059;"></div></li>
    <li><a class="subheader grey-text">Reports</a></li>
    <li><a class="waves-effect" href="#!">Monthly Audit</a></li>
  </ul>

  <!-- Main Content -->
  <main>
    <nav class="transparent z-depth-0" style="margin-top: 10px;">
      <div class="nav-wrapper container">
        <a href="#" data-target="slide-out" class="sidenav-trigger"><i class="material-icons">menu</i></a>
        <span class="brand-logo hide-on-med-and-down">Configuration</span>
      </div>
    </nav>

    <div class="container" style="margin-top: 50px;">
      <div class="row">
        <div class="col s12">
          <ul class="collection with-header">
            <li class="collection-header"><h4>General Settings</h4></li>
            <li class="collection-item">
              <div>Email Notifications
                <a href="#!" class="secondary-content">
                  <div class="switch"><label><input type="checkbox" checked><span class="lever"></span></label></div>
                </a>
              </div>
            </li>
            <li class="collection-item">
              <div>Dark Mode (System Wide)
                <a href="#!" class="secondary-content">
                  <div class="switch"><label><input type="checkbox" checked><span class="lever"></span></label></div>
                </a>
              </div>
            </li>
            <li class="collection-item">API Access Keys <a href="#!" class="secondary-content"><i class="material-icons indigo-text">vpn_key</i></a></li>
          </ul>

          <div class="center-align" style="margin-top: 2rem;">
            <a href="dashboard.html" class="btn-flat waves-effect waves-light white-text" style="border: 1px solid #444059;">
              <i class="material-icons left">arrow_back</i> Back to Dashboard
            </a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var elems = document.querySelectorAll('.sidenav');
      M.Sidenav.init(elems);
    });
  </script>
</body>
</html>
